services:
  wg-easy:
    build:
      dockerfile: ./Dockerfile.dev
    command: dev
    volumes:
      - ./src/:/app/
      - temp:/app/.nuxt/
      - temp1:/app/node_modules/
      - /lib/modules:/lib/modules:ro
      - rapptor_pf_sock:/tmp/rapptor_pf:rw
      # - ./data/:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - INIT_ENABLED=true
      - INIT_HOST=test
      - INIT_PORT=51820
      - INIT_USERNAME=testtest
      - INIT_PASSWORD=Qweasdyxcv!2
      - RAPPTOR_PORT_FORWARDING_SOCK=/tmp/rapptor_pf/rapptor_pf.sock

# folders should be generated inside container
volumes:
  temp:
    driver: local
  temp1:
    driver: local
  rapptor_pf_sock:
    external: true
